<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eslam Cafe | طلبك بلمسة</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
        }
        .step-card {
            display: none;
            animation: fadeIn 0.5s ease-in-out forwards;
        }
        .step-card.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900/80 backdrop-blur-xl border border-indigo-500/30 rounded-3xl p-6 shadow-2xl shadow-indigo-950/50 relative overflow-hidden">
        
        <div class="absolute -top-10 -left-10 w-40 h-40 bg-indigo-500/10 blur-3xl rounded-full"></div>
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-purple-500/10 blur-3xl rounded-full"></div>

        <div class="text-center mb-8 relative z-10">
            <h1 class="text-2xl font-bold tracking-wide bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                <i class="fa-solid fa-mug-hot text-indigo-400 ml-2 animate-bounce"></i> كافيه اسلام
            </h1>
            <p class="text-xs text-slate-400 mt-1">اختر مشروبك المفضل وسنقوم بتحضيره فوراً</p>
        </div>

        <div id="step-1" class="step-card active relative z-10">
            <h2 class="text-lg font-medium text-center mb-6">ما هو مشروبك المفضل؟</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="selectDrink('coffee')" class="flex flex-col items-center justify-center p-6 bg-slate-800/50 border border-slate-700 rounded-2xl hover:border-indigo-500 hover:bg-slate-800 transition-all duration-300 group cursor-pointer">
                    <div class="w-16 h-16 rounded-full bg-amber-500/10 flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-coffee text-2xl text-amber-500"></i>
                    </div>
                    <span class="font-bold text-slate-200">قهوة</span>
                </button>
                <button onclick="selectDrink('tea')" class="flex flex-col items-center justify-center p-6 bg-slate-800/50 border border-slate-700 rounded-2xl hover:border-emerald-500 hover:bg-slate-800 transition-all duration-300 group cursor-pointer">
                    <div class="w-16 h-16 rounded-full bg-emerald-500/10 flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-leaf text-2xl text-emerald-500"></i>
                    </div>
                    <span class="font-bold text-slate-200">شاي</span>
                </button>
            </div>
        </div>

        <div id="step-2" class="step-card relative z-10">
            <button onclick="goBack(1)" class="text-xs text-slate-400 hover:text-indigo-400 mb-4 cursor-pointer">
                <i class="fa-solid fa-arrow-right ml-1"></i> العودة للرئيسية
            </button>
            
            <h2 id="step-2-title" class="text-lg font-medium text-center mb-6">حدد تفاصيل المشروب</h2>
            
            <div id="coffee-options" class="hidden grid grid-cols-1 gap-3">
                <button onclick="selectSubtype('قهوة سادة (Black Coffee)')" class="flex items-center p-4 bg-slate-800/50 border border-slate-700 rounded-xl hover:border-indigo-500 transition-all cursor-pointer">
                    <i class="fa-solid fa-circle text-stone-900 text-xl ml-4"></i>
                    <div class="text-right">
                        <p class="font-bold">قهوة سادة</p>
                        <p class="text-xs text-slate-400">Black Coffee - طعم قوي وأصيل</p>
                    </div>
                </button>
                <button onclick="selectSubtype('قهوة بالحليب (Coffee with Milk)')" class="flex items-center p-4 bg-slate-800/50 border border-slate-700 rounded-xl hover:border-indigo-500 transition-all cursor-pointer">
                    <i class="fa-solid fa-cow text-amber-200 text-xl ml-4"></i>
                    <div class="text-right">
                        <p class="font-bold">قهوة بالحليب</p>
                        <p class="text-xs text-slate-400">Coffee with Milk - مزيج ناعم وغني</p>
                    </div>
                </button>
            </div>

            <div id="tea-options" class="hidden grid grid-cols-1 gap-3">
                <button onclick="selectSubtype('شاي أخضر (Green Tea)')" class="flex items-center p-4 bg-slate-800/50 border border-slate-700 rounded-xl hover:border-emerald-500 transition-all cursor-pointer">
                    <i class="fa-solid fa-seedling text-emerald-400 text-xl ml-4"></i>
                    <div class="text-right">
                        <p class="font-bold">شاي أخضر</p>
                        <p class="text-xs text-slate-400">Green Tea - صحي ومنعش</p>
                    </div>
                </button>
                <button onclick="selectSubtype('شاي أحمر (Red Tea)')" class="flex items-center p-4 bg-slate-800/50 border border-slate-700 rounded-xl hover:border-red-500 transition-all cursor-pointer">
                    <i class="fa-solid fa-teapot text-red-400 text-xl ml-4"></i>
                    <div class="text-right">
                        <p class="font-bold">شاي أحمر</p>
                        <p class="text-xs text-slate-400">Red Tea - كلاسيكي ومظبوط</p>
                    </div>
                </button>
            </div>
        </div>

        <div id="step-3" class="step-card relative z-10">
            <button onclick="goBack(2)" class="text-xs text-slate-400 hover:text-indigo-400 mb-4 cursor-pointer">
                <i class="fa-solid fa-arrow-right ml-1"></i> تعديل النوع
            </button>

            <h2 class="text-lg font-medium text-center mb-4">كم عدد الأكواب التي تريدها؟</h2>
            
            <div class="bg-slate-800/40 border border-slate-700/60 rounded-2xl p-4 mb-6 text-center">
                <p class="text-xs text-slate-400 mb-1">المشروب المختار:</p>
                <p id="summary-text" class="font-bold text-indigo-400 text-base"></p>
            </div>

            <div class="flex items-center justify-center gap-6 mb-8">
                <button onclick="changeQuantity(-1)" class="w-12 h-12 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center hover:bg-slate-700 text-xl font-bold cursor-pointer transition-colors">-</button>
                <span id="quantity-display" class="text-3xl font-bold w-12 text-center">1</span>
                <button onclick="changeQuantity(1)" class="w-12 h-12 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center hover:bg-slate-700 text-xl font-bold cursor-pointer transition-colors">+</button>
            </div>

            <button onclick="sendOrder()" class="w-full bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-emerald-950/50 cursor-pointer transition-all duration-300 transform hover:-translate-y-0.5">
                <i class="fa-brands fa-whatsapp text-xl"></i>
                إرسال الطلب عبر الواتساب
            </button>
        </div>

        <div class="mt-8 pt-4 border-t border-slate-800/60 text-center text-[10px] text-slate-500">
            جيع الحقوق محفوظة © ٢٠٢٦ | Yasen Cafe
        </div>

    </div>

    <script>
        // كائن لتخزين بيانات الطلب الحالي
        let orderData = {
            mainDrink: '',
            subType: '',
            quantity: 1
        };

        const whatsappNumber = "201018418304";

        // الانتقال بين الصفحات الافتراضية
        function navigateToStep(stepNumber) {
            document.querySelectorAll('.step-card').forEach(card => card.classList.remove('active'));
            document.getElementById(`step-${stepNumber}`).classList.add('active');
        }

        // الرجوع للخلف
        function goBack(stepNumber) {
            if(stepNumber === 2) {
                // إعادة تصفير الحقول الفرعية عند الرجوع
                document.getElementById('coffee-options').classList.add('hidden');
                document.getElementById('tea-options').classList.add('hidden');
            }
            navigateToStep(stepNumber);
        }

        // 1. اختيار المشروب الرئيسي (قهوة / شاي)
        function selectDrink(drink) {
            orderData.mainDrink = drink;
            
            const titleElement = document.getElementById('step-2-title');
            
            if (drink === 'coffee') {
                titleElement.innerText = "كيف تحب القهوة الخاصة بك؟";
                document.getElementById('coffee-options').classList.remove('hidden');
            } else if (drink === 'tea') {
                titleElement.innerText = "أي نوع من الشاي تفضل؟";
                document.getElementById('tea-options').classList.remove('hidden');
            }
            
            navigateToStep(2);
        }

        // 2. اختيار النوع الفرعي (مثلاً: شاي أخضر أو قهوة سادة)
        function selectSubtype(subtype) {
            orderData.subType = subtype;
            orderData.quantity = 1; // إعادة تعيين الكمية الافتراضية
            document.getElementById('quantity-display').innerText = orderData.quantity;
            document.getElementById('summary-text').innerText = subtype;
            
            navigateToStep(3);
        }

        // 3. تغيير الكمية بالزائد والناقص
        function changeQuantity(amount) {
            orderData.quantity += amount;
            if (orderData.quantity < 1) orderData.quantity = 1; // منع الأعداد السالبة أو الصفر
            document.getElementById('quantity-display').innerText = orderData.quantity;
        }

        // 4. تجميع الرسالة وتوجيه المستخدم للواتساب المباشر
        function sendOrder() {
            // صياغة رسالة احترافية ومنسقة لإرسالها للرقم المطلوب
            const message = `*طلب جديد من كافيه اسلام ☕🚀*%0A%0A` +
                            `• *المشروب:* ${orderData.subType}%0A` +
                            `• *الكمية:* ${orderData.quantity} كوب %0A%0A` +
                            `_تم تجهيز الطلب بنجاح، نراك قريباً! 👋_`;

            const whatsappUrl = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${message}`;
            
            // فتح الرابط في نافذة جديدة لإرسال الطلب
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
